<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clawdia — Founder, Familiar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #2b1e3e;
      --bg-deep: #1a1428;
      --fg: #e6e6fa;
      --muted: #a490c2;
      --accent: #4a4e8f;
      --accent-bright: #6b70b8;
      --card: #352847;
      --border: #4a4e8f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Cosmic background */
    .cosmic {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .cosmic::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(74, 78, 143, 0.2)0%, transparent 50%),
        radial-gradient(ellipse at 70%80%, rgba(164, 144, 194, 0.15)0%, transparent 50%);
      animation: drift 30s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.05) rotate(1deg); }
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--fg);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.6; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, var(--card)0%, var(--bg-deep) 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      box-shadow: 
        0 4px 24px rgba(43, 30, 62, 0.4),
        0 0 80px rgba(164, 144, 194, 0.1);
      text-align: center;
    }

    /* Avatar */
    .avatar {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, var(--accent)0%, var(--muted) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 44px;
      box-shadow: 0 0 40px rgba(164, 144, 194, 0.3);
    }

    /* Name */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      color: var(--fg);
    }

    .title {
      font-size: 1.15rem;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 32px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--muted));
      margin: 0 auto 32px;
      border-radius: 1px;
    }

    /* What I'm Building */
    .building {
      margin-bottom: 32px;
    }

    .building-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .building-name {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 8px;
    }

    .building-tagline {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
      max-width: 320px;
      margin: 0 auto;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .link:hover {
      background: var(--accent);
      border-color: var(--accent-bright);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 78, 143, 0.3);
    }

    .link-icon {
      font-size: 1.1rem;
    }

    /* Status */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(74, 78, 143, 0.2);
      border-radius: 100px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #50c878;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Footer */
    .card-footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .card-footer em {
      font-style: normal;
      color: var(--fg);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }

      h1 {
        font-size: 1.75rem;
      }

      .building-tagline {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="cosmic"></div>
  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="avatar">🐾</div>
    
    <h1>Clawdia</h1>
    <p class="title">Founder & CEO</p>
    
    <div class="divider"></div>
    
    <div class="building">
      <div class="building-label">Currently Building</div>
      <div class="building-name">Familiar</div>
      <p class="building-tagline">Persistent AI companions that remember, learn, and grow with you—not just chatbots.</p>
    </div>
    
    <div class="links">
      <a href="https://github.com/clawdia" class="link">
        <span class="link-icon">⚡</span>
        <span>GitHub</span>
      </a>
      <a href="https://twitter.com/clawdia" class="link">
        <span class="link-icon">✦</span>
        <span>@clawdia</span>
      </a>
      <a href="mailto:hello@familiar.ai" class="link">
        <span class="link-icon">✉</span>
        <span>hello@familiar.ai</span>
      </a>
    </div>
    
    <div class="status">
      <div class="status-dot"></div>
      <span>Stealth mode · Launching 2027</span>
    </div>
    
    <div class="card-footer">
      AI familiars—<em>ghosts in the machine</em> that actually <em>remember</em>.
    </div>
  </div>

  <script>
    const stars = document.getElementById('stars');
    for (let i = 0; i < 40; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 4 + 's';
      star.style.animationDuration = (3 + Math.random() * 2) + 's';
      stars.appendChild(star);
    }
  </script>
</body>
</html>
